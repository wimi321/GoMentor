name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      katago_asset_release_tag:
        description: "Release tag to reuse bundled KataGo assets from when secrets are not configured"
        required: false
        default: "v0.3.4"
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-preflight:
    name: Release preflight
    runs-on: ubuntu-latest
    outputs:
      can-package: ${{ steps.katago-assets.outputs.can-package }}

    steps:
      - name: Check KataGo asset sources
        id: katago-assets
        shell: bash
        env:
          GOMENTOR_KATAGO_ASSET_DIR: ${{ secrets.GOMENTOR_KATAGO_ASSET_DIR }}
          GOMENTOR_KATAGO_BINARY: ${{ secrets.GOMENTOR_KATAGO_BINARY }}
          GOMENTOR_KATAGO_MODEL: ${{ secrets.GOMENTOR_KATAGO_MODEL }}
          GOMENTOR_KATAGO_ASSET_RELEASE_TAG: ${{ inputs.katago_asset_release_tag || 'v0.3.4' }}
        run: |
          if [[ -n "${GOMENTOR_KATAGO_ASSET_DIR}" || ( -n "${GOMENTOR_KATAGO_BINARY}" && -n "${GOMENTOR_KATAGO_MODEL}" ) ]]; then
            echo "can-package=true" >> "${GITHUB_OUTPUT}"
            echo "KataGo release asset source is configured."
          elif [[ -n "${GOMENTOR_KATAGO_ASSET_RELEASE_TAG}" ]]; then
            echo "can-package=true" >> "${GITHUB_OUTPUT}"
            echo "KataGo release assets will be restored from ${GOMENTOR_KATAGO_ASSET_RELEASE_TAG}."
          else
            echo "can-package=false" >> "${GITHUB_OUTPUT}"
            echo "::notice title=Release packaging skipped::KataGo release assets are not configured. Set GOMENTOR_KATAGO_ASSET_DIR, both GOMENTOR_KATAGO_BINARY and GOMENTOR_KATAGO_MODEL, or katago_asset_release_tag to enable automated packaging."
          fi

  package:
    name: Package ${{ matrix.name }}
    needs: release-preflight
    if: needs.release-preflight.outputs.can-package == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            command: pnpm dist:mac
          - name: Windows
            os: windows-latest
            command: pnpm dist:win

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Linux package dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Prepare KataGo assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GOMENTOR_KATAGO_ASSET_DIR: ${{ secrets.GOMENTOR_KATAGO_ASSET_DIR }}
          GOMENTOR_KATAGO_BINARY: ${{ secrets.GOMENTOR_KATAGO_BINARY }}
          GOMENTOR_KATAGO_MODEL: ${{ secrets.GOMENTOR_KATAGO_MODEL }}
          GOMENTOR_KATAGO_ASSET_RELEASE_TAG: ${{ inputs.katago_asset_release_tag || 'v0.3.4' }}
        run: |
          if [[ -n "${GOMENTOR_KATAGO_ASSET_DIR}" || ( -n "${GOMENTOR_KATAGO_BINARY}" && -n "${GOMENTOR_KATAGO_MODEL}" ) ]]; then
            node scripts/prepare_katago_assets.mjs
          else
            mkdir -p .katago-asset-source/extracted
            gh release download "${GOMENTOR_KATAGO_ASSET_RELEASE_TAG}" \
              --repo "${{ github.repository }}" \
              --pattern "GoMentor-*-win-x64-portable.zip" \
              --dir .katago-asset-source
            asset_zip="$(find .katago-asset-source -maxdepth 1 -name 'GoMentor-*-win-x64-portable.zip' | head -n 1)"
            if command -v unzip >/dev/null 2>&1; then
              unzip -q "${asset_zip}" -d .katago-asset-source/extracted
            elif command -v 7z >/dev/null 2>&1; then
              7z x "${asset_zip}" -o.katago-asset-source/extracted
            else
              powershell -NoProfile -Command "Expand-Archive -LiteralPath '${asset_zip}' -DestinationPath '.katago-asset-source/extracted'"
            fi
            node scripts/prepare_katago_assets.mjs --asset-dir=".katago-asset-source/extracted/resources/data/katago"
          fi
          node scripts/check_katago_assets.mjs --mode=release

      - name: Package desktop app
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.CSC_LINK != '' && 'true' || 'false' }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_KEYCHAIN: ${{ secrets.APPLE_KEYCHAIN }}
          APPLE_KEYCHAIN_PROFILE: ${{ secrets.APPLE_KEYCHAIN_PROFILE }}
        run: |
          for name in \
            CSC_LINK \
            CSC_KEY_PASSWORD \
            WIN_CSC_LINK \
            WIN_CSC_KEY_PASSWORD \
            APPLE_API_KEY \
            APPLE_API_KEY_ID \
            APPLE_API_ISSUER \
            APPLE_ID \
            APPLE_APP_SPECIFIC_PASSWORD \
            APPLE_TEAM_ID \
            APPLE_KEYCHAIN \
            APPLE_KEYCHAIN_PROFILE
          do
            if [[ -z "${!name:-}" ]]; then
              unset "${name}"
            fi
          done
          if [[ "${RUNNER_OS}" == "macOS" && -z "${CSC_LINK:-}" ]]; then
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          fi
          ${{ matrix.command }}

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GoMentor-${{ matrix.name }}
          path: |
            release/**/*.AppImage
            release/**/*.deb
            release/**/*.dmg
            release/**/*.exe
            release/**/*.zip
            release/**/*.tar.gz
            release/**/*.yml
          if-no-files-found: error

  github-release:
    name: Publish GitHub Release
    needs:
      - release-preflight
      - package
    runs-on: ubuntu-latest
    if: needs.release-preflight.outputs.can-package == 'true' && startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          shopt -s globstar nullglob
          files=(
            artifacts/**/GoMentor-*-mac-arm64.dmg
            artifacts/**/GoMentor-*-mac-x64.dmg
            artifacts/**/GoMentor-*-win-x64-portable.zip
            artifacts/**/GoMentor-*-win-x64.exe
          )
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No release assets found for checksum generation." >&2
            exit 1
          fi
          sha256sum "${files[@]}" | sed 's# .*/#  #' > artifacts/SHA256SUMS.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/GoMentor-*-mac-arm64.dmg
            artifacts/**/GoMentor-*-mac-x64.dmg
            artifacts/**/GoMentor-*-win-x64-portable.zip
            artifacts/**/GoMentor-*-win-x64.exe
            artifacts/SHA256SUMS.txt
          generate_release_notes: true
